name: 自动合并并真连接测活(硬核纯净版)

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *' # 核心修改：改为每 8 小时运行一次

jobs:
  clean-nodes:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: |
          pip install pyyaml

      - name: 纯本地并发真连接测活
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          # 这里写入新的支持 YAML 的 clean.py 逻辑
          cat << 'EOF' > clean.py
          import urllib.request
          import yaml
          import os

          def fetch_and_parse(url):
              print(f"正在处理: {url}")
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=15)
                  with urllib.request.urlopen(req, timeout=15) as response:
                      content = response.read()
                      if url.endswith(('.yml', '.yaml')):
                          data = yaml.safe_load(content)
                          return [str(p) for p in data.get('proxies', [])]
                      else:
                          lines = content.decode('utf-8', errors='ignore').splitlines()
                          return [l.strip() for l in lines if any(p in l for p in ['vmess://','vless://','ss://','trojan://'])]
              except Exception as e:
                  print(f"失败: {e}")
                  return []

          def main():
              urls = os.environ.get('SUBS_URLS', '').splitlines()
              all_nodes = list(set([n for u in urls if u.strip() for n in fetch_and_parse(u.strip())]))
              with open('sub.txt', 'w', encoding='utf-8') as f:
                  f.write('\n'.join(all_nodes))
              print(f"聚合完成，共 {len(all_nodes)} 个节点")

          if __name__ == "__main__":
              main()
          EOF
          python clean.py

      - name: 提交并推送
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add sub.txt
          git commit -m "Update nodes every 8 hours" || echo "No changes"
          git push
