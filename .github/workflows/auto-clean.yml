name: 自动合并并真连接测活(硬核纯净版)

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *' 

jobs:
  clean-nodes:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: |
          pip install pyyaml

      - name: 执行清洗与聚合
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > clean.py
          import urllib.request
          import yaml
          import os

          def fetch_and_parse(url):
              print(f"正在处理: {url}")
              try:
                  # 标准请求写法，兼容性强
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=20) as response:
                      content = response.read()
                      
                      # 智能判断格式
                      if url.endswith(('.yml', '.yaml')):
                          data = yaml.safe_load(content)
                          if data and 'proxies' in data:
                              # 提取节点并转为字符串
                              return [str(p) for p in data['proxies']]
                      else:
                          lines = content.decode('utf-8', errors='ignore').splitlines()
                          # 宽容模式：保留所有有内容的行
                          return [l.strip() for l in lines if len(l.strip()) > 10]
                          
              except Exception as e:
                  print(f"失败: {e}")
                  return []
              return []

          def main():
              urls = os.environ.get('SUBS_URLS', '').splitlines()
              all_nodes = []
              for u in urls:
                  if u.strip():
                      all_nodes.extend(fetch_and_parse(u.strip()))
              
              # 去重
              unique_nodes = list(set(all_nodes))
              
              # 写入 sub.txt
              with open('sub.txt', 'w', encoding='utf-8') as f:
                  f.write('\n'.join(unique_nodes))
              print(f"================")
              print(f"聚合完成，共 {len(unique_nodes)} 个唯一节点。")
              print(f"================")

          if __name__ == "__main__":
              main()
          EOF
          python clean.py

      - name: 提交并推送
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add sub.txt
          git commit -m "Update nodes: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
