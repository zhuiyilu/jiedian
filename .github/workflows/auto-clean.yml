name: 自动聚合节点(详情版)

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install pyyaml

      - name: 运行解析脚本
        env:
          SUBS_URLS: ${{ secrets.SUBS_URLS }}
        run: |
          cat << 'EOF' > clean.py
          import urllib.request, base64, os, yaml

          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=20) as res:
                      return res.read()
              except Exception as e:
                  print(f"!!! 链接读取失败: {url} | 错误: {e}")
                  return None

          def decode_content(content):
              try:
                  return base64.b64decode(content).decode('utf-8', errors='ignore')
              except:
                  return content.decode('utf-8', errors='ignore')

          def main():
              raw_secrets = os.environ.get('SUBS_URLS', '')
              urls = [u.strip() for u in raw_secrets.splitlines() if u.strip()]
              
              print(f"=== 开始聚合，共检测到 {len(urls)} 个订阅源 ===")
              all_nodes = []
              
              for i, url in enumerate(urls, 1):
                  print(f"--> 处理第 {i} 个源: {url}")
                  raw_data = fetch(url)
                  if not raw_data: 
                      print(f"    -> 第 {i} 个源读取为空。")
                      continue
                  
                  decoded_text = decode_content(raw_data)
                  
                  count = 0
                  # 检查是否为 YAML 格式
                  if decoded_text.strip().startswith(('proxies:', '---')):
                      try:
                          data = yaml.safe_load(decoded_text)
                          if data and 'proxies' in data:
                              for p in data['proxies']:
                                  node = str(p)
                                  if '://' in node:
                                      all_nodes.append(node)
                                      count += 1
                      except: pass
                  
                  # 检查是否为普通节点列表
                  if count == 0:
                      for line in decoded_text.splitlines():
                          line = line.strip()
                          if '://' in line:
                              all_nodes.append(line)
                              count += 1
                  
                  print(f"    -> 成功提取: {count} 个节点")
              
              unique_nodes = list(set(all_nodes))
              print(f"=== 聚合结束，去重后共保留 {len(unique_nodes)} 个节点 ===")
              
              if unique_nodes:
                  encoded = base64.b64encode('\n'.join(unique_nodes).encode('utf-8')).decode('utf-8')
                  with open('sub.txt', 'w', encoding='utf-8') as f:
                      f.write(encoded)
              else:
                  print("!!! 未能提取到任何有效节点，请检查订阅链接是否可用。")

          if __name__ == "__main__": main()
          EOF
          python clean.py

      - name: 提交更新
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add sub.txt
          git commit -m "Auto-update subscription" || echo "No changes"
          git push
