name: 自动合并测速清洗

on:
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早上 6 点自动运行
  workflow_dispatch: # 允许你随时手动点击运行

jobs:
  clean-nodes:
    runs-on: ubuntu-latest
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 安装 Python 和依赖组件
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 运行合并与并发测活
      env:
        SUBS: ${{ secrets.SUBS_URLS }}
      run: |
        cat << 'EOF' > clean.py
        import os
        import urllib.request
        import base64
        import socket
        from concurrent.futures import ThreadPoolExecutor

        # 1. 抓取并合并节点
        urls = filter(None, os.environ.get('SUBS', '').split('\n'))
        raw_nodes = []
        for url in urls:
            try:
                req = urllib.request.Request(url.strip(), headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=10) as response:
                    content = response.read()
                    # 尝试 base64 解码，解不开就当作普通明文文本处理
                    try:
                        decoded = base64.b64decode(content).decode('utf-8')
                        raw_nodes.extend(decoded.splitlines())
                    except Exception:
                        raw_nodes.extend(content.decode('utf-8').splitlines())
            except Exception as e:
                print(f"提取链接失败: {url}, 错误: {e}")

        unique_nodes = list(set([n.strip() for n in raw_nodes if n.strip()]))
        print(f"总共合并抓取到 {len(unique_nodes)} 个节点，开始并发测活...")

        # 2. 极速并发 TCP 测活 (利用云端高带宽，200线程秒杀)
        live_nodes = []
        def check_node(node):
            if not (node.startswith('vmess://') or node.startswith('vless://') or node.startswith('ss://') or node.startswith('ssr://') or node.startswith('trojan://') or node.startswith('hysteria2://') or node.startswith('tuic://')):
                return
            try:
                # 提取节点中的域名/IP和端口进行TCP握手
                parts = node.split('://')[1]
                if '@' in parts:
                    server_part = parts.split('@')[1].split('?')[0].split('#')[0]
                else:
                    server_part = base64.b64decode(parts).decode('utf-8', errors='ignore').split('@')[-1]
                
                if ':' in server_part:
                    host, port = server_part.split(':')[0], int(server_part.split(':')[1])
                    # 云端高并发建立 socket 握手测活
                    with socket.create_connection((host, port), timeout=3) as sock:
                        live_nodes.append(node)
            except:
                pass

        with ThreadPoolExecutor(max_workers=200) as executor:
            executor.map(check_node, unique_nodes)

        print(f"清洗完毕！共剔除死节点，剩余 {len(live_nodes)} 个优质活节点。")

        # 3. 写入本地文件
        with open('sub.txt', 'w', encoding='utf-8') as f:
            f.write('\n'.join(live_nodes))
        EOF
        python clean.py

    - name: 自动提交并推送到 GitHub 仓库
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add sub.txt
        git commit -m "自动云端测速清洗完成" || exit 0
        git push
